name: Frontend Checks

on:
  push:
    paths:
      - 'BerkeleySequencingLab/frontend/**'
      - '.github/workflows/frontend-tests.yml'
  pull_request:
    paths:
      - 'BerkeleySequencingLab/frontend/**'
      - '.github/workflows/frontend-tests.yml'

jobs:
  frontend-checks:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: BerkeleySequencingLab/frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: BerkeleySequencingLab/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test -- --runInBand

      - name: Run deployment build
        run: npm run build:deploy
